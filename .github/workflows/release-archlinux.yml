name: Release (Arch Linux)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Arch package (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-24.04
          - arch: aarch64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}
    container:
      image: archlinux:base-devel

    steps:
      - uses: actions/checkout@v6

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm --needed
          pacman -S --noconfirm --needed \
            base-devel \
            git \
            nodejs \
            npm \
            rust \
            cargo \
            webkit2gtk-4.1 \
            gtk3 \
            libayatana-appindicator \
            librsvg \
            xdg-utils \
            patchelf

      - name: Prepare package build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build Arch package
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          workdir="$GITHUB_WORKSPACE/.archlinux-${{ matrix.arch }}"
          pkgdir="$workdir/packaging"

          rm -rf "$workdir" "$GITHUB_WORKSPACE/release-artifacts-${{ matrix.arch }}"
          mkdir -p "$pkgdir" "$GITHUB_WORKSPACE/release-artifacts-${{ matrix.arch }}"

          cp -R packaging/archlinux/. "$pkgdir/"
          sed -i "s/__PKGVER__/${version}/g" "$pkgdir/PKGBUILD"

          chown -R builder:builder "$workdir"

          su builder -c "cd '$pkgdir' && makepkg --noconfirm --cleanbuild --skipinteg"

          mkdir -p "$GITHUB_WORKSPACE/release-artifacts-${{ matrix.arch }}"
          mv "$pkgdir"/*.pkg.tar.zst "$GITHUB_WORKSPACE/release-artifacts-${{ matrix.arch }}/"

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v7
        with:
          name: archlinux-${{ matrix.arch }}
          path: release-artifacts-${{ matrix.arch }}/*.pkg.tar.zst
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show files
        run: find artifacts -type f

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: artifacts/**/*.pkg.tar.zst
